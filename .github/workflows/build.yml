name: Build Bootloader for Tenda RX12L Pro

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-11-aarch64-linux-gnu g++-11-aarch64-linux-gnu
        
      - name: Install other dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flex bison libssl-dev git python3
          # Build device-tree-compiler from source for newer version
          sudo apt-get install -y git build-essential
          cd /tmp
          git clone --depth 1 https://github.com/dgibson/dtc.git
          cd dtc
          make -j$(nproc)
          sudo make install
          cd ~
          rm -rf /tmp/dtc
        
      - name: Build bootloader
        run: |
          sudo ln -sf /usr/bin/aarch64-linux-gnu-gcc-11 /usr/bin/aarch64-linux-gnu-gcc
          sudo ln -sf /usr/bin/aarch64-linux-gnu-g++-11 /usr/bin/aarch64-linux-gnu-g++
          export PATH="/usr/bin:$PATH"
          export CROSS_COMPILE=aarch64-linux-gnu-
          SOC=mt7981 BOARD=tenda_rx12l_pro ./build.sh
          echo "=== Build complete, checking output ==="
          ls -la output/
          find . -name "*.bin" -type f
        
      - name: Upload FIP
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fip-bin
          path: output/*fip*.bin
          if-no-files-found: error
        
      - name: Upload BL2
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bl2-bin
          path: output/*bl2*.bin
          if-no-files-found: error
