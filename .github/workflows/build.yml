name: Build Bootloader for Tenda RX12L Pro

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-11-aarch64-linux-gnu g++-11-aarch64-linux-gnu
          echo "CC=aarch64-linux-gnu-gcc-11" >> $GITHUB_ENV
          echo "CXX=aarch64-linux-gnu-g++-11" >> $GITHUB_ENV
          ls -la /usr/bin/aarch64*
        
      - name: Install other dependencies
        run: |
          sudo apt-get install -y flex bison libssl-dev device-tree-compiler git python3
        
      - name: Build bootloader
        run: |
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=${CC:-aarch64-linux-gnu-gcc-11}
          export CXX=${CXX:-aarch64-linux-gnu-g++-11}
          SOC=mt7981 BOARD=tenda_rx12l_pro ./build.sh
          echo "=== Output contents ==="
          find . -name "*.bin" -type f 2>/dev/null
          ls -la output/ 2>/dev/null || echo "No output dir"
      
      - name: Upload all binaries
        uses: actions/upload-artifact@v4
        with:
          name: bootloader-files
          path: |
            output/
            **/*.bin
          if-no-files-found: error
